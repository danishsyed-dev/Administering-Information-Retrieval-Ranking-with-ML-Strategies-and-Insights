{% extends "base.html" %}
{% block contents %}
<div class="glass-card fade-in" style="margin-top: 4rem;">
    <h2 class="text-gradient-purple" style="text-align: center; margin-top: 0; font-size: 2rem;">Reset Password</h2>
    <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">Verify your registered email and mobile number to reset your password.</p>

    {% if hello %}
        <div style="background-color: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #f87171; padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; text-align: center; font-weight: 600;">
            {{ hello }}
        </div>
    {% endif %}

    <form action="{% url 'frgt' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="e1">Email Address</label>
            <input type="email" id="e1" name="e1" placeholder="Enter your registered email" required>
        </div>
        <div class="form-group">
            <label for="m1">Mobile Number</label>
            <input type="text" id="m1" name="m1" placeholder="Enter your 10-digit mobile number" required>
        </div>
        <div style="text-align: center; margin-top: 2rem;">
            <button type="submit" class="btn-primary-glow" style="width: 100%;">Verify Account</button>
        </div>
    </form>
</div>
{% endblock %}
