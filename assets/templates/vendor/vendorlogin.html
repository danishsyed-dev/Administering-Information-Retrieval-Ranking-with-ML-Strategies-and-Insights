{% extends "base.html" %}
{% block contents %}
<div class="outer-bezel fade-in" style="margin-top: 3rem;">
    <div class="inner-core">
        <h2 style="margin-top: 0; font-size: 1.8rem; text-align: center;">Vendor Sign In</h2>
        <p style="color: var(--text-secondary); text-align: center; font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.5;">Access the file control center to index text documents.</p>

        <form action="{% url 'vendorloginaction' %}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="mail">Email Address</label>
                <input type="email" id="mail" name="mail" placeholder="e.g. vendor@domain.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>

            <div style="text-align: right; margin-bottom: 1.8rem; font-size: 0.85rem;">
                <a href="{% url 'vendorregistration' %}" style="color: var(--accent-emerald); text-decoration: none; font-weight: 600;">Create Vendor Account</a>
            </div>

            <div style="display: flex; justify-content: center;">
                <button type="submit" class="btn-premium" style="width: 100%;">
                    <span>Sign In</span>
                    <span class="btn-arrow">&rarr;</span>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
