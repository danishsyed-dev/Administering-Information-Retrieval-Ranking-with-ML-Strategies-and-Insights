{% extends "base.html" %}
{% block contents %}
<div class="outer-bezel fade-in" style="margin-top: 2rem;">
    <div class="inner-core">
        <h2 style="margin-top: 0; font-size: 1.8rem; text-align: center;">Vendor Sign Up</h2>
        <p style="color: var(--text-secondary); text-align: center; font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.5;">Apply for a document vendor account. Activations are manually checked by administrators.</p>

        <form action="{% url 'vendorregistration' %}" method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="loginid">Username</label>
                <input type="text" id="loginid" name="loginid" placeholder="e.g. Acme (alphabets only)" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Choose a password" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="e.g. vendor@domain.com" required>
            </div>

            <div class="form-group">
                <label for="mobile">Mobile Number</label>
                <input type="text" id="mobile" name="mobile" placeholder="10-digit mobile number" required>
            </div>

            <div class="form-group">
                <label for="place">Place</label>
                <input type="text" id="place" name="place" placeholder="Enter state or province" required>
            </div>

            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city" placeholder="Enter city name" required>
            </div>

            <div style="margin-top: 2.5rem; display: flex; justify-content: center;">
                <button type="submit" class="btn-premium" style="width: 100%;">
                    <span>Create Vendor Account</span>
                    <span class="btn-arrow">&rarr;</span>
                </button>
            </div>
            
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.95rem; color: var(--text-secondary); margin-bottom: 0;">
                Already have a vendor account? <a href="{% url 'vendor' %}" style="color: var(--accent-emerald); text-decoration: none; font-weight: 600;">Sign In</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
