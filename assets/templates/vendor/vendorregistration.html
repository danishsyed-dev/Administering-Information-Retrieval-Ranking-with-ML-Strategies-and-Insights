{% extends "base.html" %}
{% block contents %}
<div class="glass-card fade-in" style="margin-top: 2rem;">
    <h2 class="text-gradient-purple" style="text-align: center; margin-top: 0; font-size: 2rem;">Vendor Registration</h2>
    <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">Register as a document vendor to upload and map texts. Account activation requires admin approval.</p>

    <form action="{% url 'vendorregistration' %}" method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="loginid">Username</label>
            <input type="text" id="loginid" name="loginid" placeholder="Enter username (alphabets only)" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Choose a password" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="vendor@domain.com" required>
        </div>

        <div class="form-group">
            <label for="mobile">Mobile Number</label>
            <input type="text" id="mobile" name="mobile" placeholder="10-digit mobile number" required>
        </div>

        <div class="form-group">
            <label for="place">Place</label>
            <input type="text" id="place" name="place" placeholder="Enter state or province" required>
        </div>

        <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" name="city" placeholder="Enter city name" required>
        </div>

        <div style="text-align: center; margin-top: 2rem;">
            <button type="submit" class="btn-secondary-glow" style="width: 100%;">Register Account</button>
        </div>
        
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.95rem; color: var(--text-secondary);">
            Already have a vendor account? <a href="{% url 'vendor' %}" style="color: var(--accent-indigo); text-decoration: none; font-weight: 600;">Sign In</a>
        </p>
    </form>
</div>
{% endblock %}
