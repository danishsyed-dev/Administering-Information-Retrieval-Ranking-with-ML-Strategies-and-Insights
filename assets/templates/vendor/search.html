{% extends "base.html" %}
{% block contents %}
<div class="outer-bezel fade-in" style="margin-top: 4rem; max-width: 700px;">
    <div class="inner-core" style="padding: 3rem;">
        <h2 style="margin-top: 0; font-size: 1.8rem; text-align: center;">Document Index Lookup</h2>
        <p style="color: var(--text-secondary); text-align: center; font-size: 0.9rem; margin-bottom: 2.5rem; line-height: 1.5;">Retrieve documents stored in the index by entering matching keywords.</p>

        <form action="{% url 'usersearchresult' %}" method="post">
            {% csrf_token %}
            <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                <input type="text" name="query" placeholder="Enter keywords to search..." style="flex-grow: 1;" required>
                <button type="submit" class="btn-premium">
                    <span>Find Files</span>
                    <span class="btn-arrow">&rarr;</span>
                </button>
            </div>
        </form>
        
        <div style="text-align: center; margin-top: 2.5rem;">
            <a href="{% url 'home' %}" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 600; transition: var(--transition-premium);" onmouseover="this.style.color='#ffffff';" onmouseout="this.style.color='var(--text-secondary)';">Back Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
